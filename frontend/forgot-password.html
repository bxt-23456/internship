<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>忘记密码 - 健康之路在线医疗</title>
    <script src="js/vue.js"></script>
    <script src="js/axios-0.18.0.js"></script>
    <script src="js/auth-interceptor.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .forgot-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo img {
            width: 70px;
            height: 70px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .logo h1 {
            color: #1e88e5;
            font-size: 24px;
            font-weight: bold;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group .input-row {
            display: flex;
            gap: 10px;
        }
        .form-group .input-row input:first-child {
            flex: 1;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e8eef3;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1e88e5;
            box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.1);
        }
        .form-group input.error {
            border-color: #ef5350;
        }
        .form-group .error-message {
            color: #ef5350;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .form-group .error-message.show {
            display: block;
        }
        .captcha-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }
        .captcha-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
        }
        .captcha-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e88e5 0%, #42a5f5 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(30, 136, 229, 0.4);
        }
        .reset-btn:active {
            transform: translateY(0);
        }
        .reset-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #e8eef3;
            font-size: 14px;
            color: #666;
        }
        .login-link a {
            color: #1e88e5;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .error-alert {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        .error-alert.show {
            display: block;
        }
    </style>
</head>
<body>
    <div id="app" class="forgot-container">
        <div class="logo">
            <h1>{{ config.hospital_name || '健康之路在线医疗' }}</h1>
            <p>重置您的密码</p>
        </div>

        <div class="success-message" :class="{show: showSuccess}">
            {{ successMessage }}
        </div>

        <div class="error-alert" :class="{show: showError}">
            {{ errorMessage }}
        </div>

        <div class="form-group">
            <label for="phone">手机号</label>
            <input
                type="tel"
                id="phone"
                v-model="form.phone"
                :class="{error: errors.phone}"
                placeholder="请输入注册时的手机号"
                maxlength="11"
            >
            <div class="error-message" :class="{show: errors.phone}">{{ errors.phone }}</div>
        </div>

        <div class="form-group">
            <label for="captcha">短信验证码</label>
            <div class="input-row">
                <input
                    type="tel"
                    id="captcha"
                    v-model="form.captcha"
                    :class="{error: errors.captcha}"
                    placeholder="请输入验证码"
                    maxlength="6"
                >
                <button class="captcha-btn" :disabled="captchaDisabled || !form.phone" @click="sendCaptcha">
                    {{ captchaText }}
                </button>
            </div>
            <div class="error-message" :class="{show: errors.captcha}">{{ errors.captcha }}</div>
        </div>

        <div class="form-group">
            <label for="newPassword">新密码</label>
            <input
                type="password"
                id="newPassword"
                v-model="form.newPassword"
                :class="{error: errors.newPassword}"
                placeholder="请输入新密码（至少6位）"
            >
            <div class="error-message" :class="{show: errors.newPassword}">{{ errors.newPassword }}</div>
        </div>

        <div class="form-group">
            <label for="confirmPassword">确认新密码</label>
            <input
                type="password"
                id="confirmPassword"
                v-model="form.confirmPassword"
                :class="{error: errors.confirmPassword}"
                placeholder="请再次输入新密码"
            >
            <div class="error-message" :class="{show: errors.confirmPassword}">{{ errors.confirmPassword }}</div>
        </div>

        <button class="reset-btn" :disabled="loading" @click="handleReset">
            <span v-if="loading">重置中...</span>
            <span v-else>重置密码</span>
        </button>

        <div class="login-link">
            <a href="login.html">返回登录</a>
        </div>
    </div>

    <script>
        new Vue({
            el: '#app',
            data: {
                form: {
                    phone: '',
                    captcha: '',
                    newPassword: '',
                    confirmPassword: ''
                },
                errors: {
                    phone: '',
                    captcha: '',
                    newPassword: '',
                    confirmPassword: ''
                },
                loading: false,
                showSuccess: false,
                showError: false,
                successMessage: '',
                errorMessage: '',
                captchaDisabled: false,
                captchaText: '获取验证码',
                captchaCountdown: 60,
                config: {}
            },
            methods: {
                validatePhone(phone) {
                    const phoneRegex = /^1[3-9]\d{9}$/;
                    return phoneRegex.test(phone);
                },
                validateForm() {
                    let isValid = true;
                    this.errors = { phone: '', captcha: '', newPassword: '', confirmPassword: '' };

                    if (!this.form.phone) {
                        this.errors.phone = '请输入手机号';
                        isValid = false;
                    } else if (!this.validatePhone(this.form.phone)) {
                        this.errors.phone = '请输入有效的手机号';
                        isValid = false;
                    }

                    if (!this.form.captcha) {
                        this.errors.captcha = '请输入验证码';
                        isValid = false;
                    }

                    if (!this.form.newPassword) {
                        this.errors.newPassword = '请输入新密码';
                        isValid = false;
                    } else if (this.form.newPassword.length < 6) {
                        this.errors.newPassword = '密码长度不能少于6位';
                        isValid = false;
                    }

                    if (!this.form.confirmPassword) {
                        this.errors.confirmPassword = '请确认新密码';
                        isValid = false;
                    } else if (this.form.newPassword !== this.form.confirmPassword) {
                        this.errors.confirmPassword = '两次输入的密码不一致';
                        isValid = false;
                    }

                    return isValid;
                },
                sendCaptcha() {
                    if (!this.form.phone || !this.validatePhone(this.form.phone)) {
                        this.errors.phone = '请输入有效的手机号';
                        return;
                    }

                    this.captchaDisabled = true;
                    this.showError = false;
                    this.showSuccess = false;

                    // 调用后端发送忘记密码验证码接口
                    axios.post('/user/sendResetCode', {
                        phone: this.form.phone
                    }).then(res => {
                        if (res.data.flag) {
                            this.successMessage = '验证码已发送到手机，请注意查收';
                            this.showSuccess = true;
                        } else {
                            this.errorMessage = res.data.message || '验证码发送失败';
                            this.showError = true;
                            this.captchaDisabled = false;
                            return;
                        }
                    }).catch(err => {
                        this.errorMessage = '网络错误，请稍后重试';
                        this.showError = true;
                        this.captchaDisabled = false;
                        return;
                    });

                    let count = this.captchaCountdown;
                    const timer = setInterval(() => {
                        count--;
                        this.captchaText = `${count}秒后重发`;

                        if (count <= 0) {
                            clearInterval(timer);
                            this.captchaDisabled = false;
                            this.captchaText = '获取验证码';
                        }
                    }, 1000);
                },
                handleReset() {
                    if (!this.validateForm()) {
                        return;
                    }

                    this.loading = true;
                    this.showError = false;
                    this.showSuccess = false;

                    // 调用后端重置密码接口
                    axios.post('/user/resetPassword', {
                        phone: this.form.phone,
                        code: this.form.captcha,
                        newPassword: this.form.newPassword
                    }).then(res => {
                        this.loading = false;
                        if (res.data.flag) {
                            this.successMessage = '密码重置成功，即将跳转登录页面...';
                            this.showSuccess = true;
                            setTimeout(() => {
                                window.location.href = 'login.html';
                            }, 1500);
                        } else {
                            this.errorMessage = res.data.message || '密码重置失败';
                            this.showError = true;
                        }
                    }).catch(err => {
                        this.loading = false;
                        this.errorMessage = '网络错误，请稍后重试';
                        this.showError = true;
                    });
                },
                async loadConfig() {
                    try {
                        const response = await axios.get('/config/all');
                        if (response.data.code === 20000) {
                            this.config = response.data.data || {};
                        }
                    } catch (error) {
                        console.error('获取系统配置失败:', error);
                    }
                }
            },
            mounted() {
                this.loadConfig();
            }
        });
    </script>
</body>
</html>
